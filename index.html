<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 世界杯 · 美加墨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  :root {
    --bg: #0a0f1e; --card: rgba(255,255,255,0.04); --card-solid: #121a2e;
    --border: rgba(255,255,255,0.08); --text: #eef2f8; --dim: #98a4b8;
    --accent: #4ade80; --accent2: #38bdf8; --live: #fb4d5c; --gold: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 780px; margin: 0 auto; padding: 0 14px 80px; }

  /* ---- hero ---- */
  .hero {
    position: relative; overflow: hidden;
    background:
      radial-gradient(ellipse 90% 120% at 80% -20%, rgba(56,189,248,0.22), transparent 55%),
      radial-gradient(ellipse 80% 100% at 10% -10%, rgba(74,222,128,0.18), transparent 50%),
      linear-gradient(180deg, #101a33 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero-inner { max-width: 780px; margin: 0 auto; padding: 34px 14px 22px; position: relative; }
  .hero h1 { font-size: 27px; font-weight: 800; letter-spacing: 0.5px; }
  .hero h1 .grad {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero .sub { color: var(--dim); font-size: 13px; margin-top: 7px; letter-spacing: 0.3px; }
  .hero .ball { position: absolute; right: 8px; top: 22px; font-size: 58px; opacity: 0.16; transform: rotate(-12deg); }
  .countdown {
    display: inline-flex; align-items: center; gap: 8px; margin-top: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 100px; padding: 7px 16px; font-size: 13px; color: var(--dim);
  }
  .countdown b { color: var(--gold); font-size: 15px; font-variant-numeric: tabular-nums; }

  /* ---- nav ---- */
  nav {
    display: flex; gap: 8px; position: sticky; top: 0; z-index: 20;
    background: rgba(10,15,30,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 12px 0 10px; margin: 0 -14px; padding-left: 14px; padding-right: 14px;
    border-bottom: 1px solid var(--border);
  }
  nav button {
    flex: 1; padding: 10px 0; font-size: 15px; border-radius: 10px; font-weight: 500;
    border: 1px solid var(--border); background: var(--card); color: var(--dim);
    cursor: pointer; transition: all .15s;
  }
  nav button.on {
    background: linear-gradient(135deg, rgba(74,222,128,0.18), rgba(56,189,248,0.18));
    border-color: rgba(74,222,128,0.5); color: var(--text); font-weight: 700;
  }
  .panel { display: none; }
  .panel.on { display: block; animation: fadein .25s; }
  @keyframes fadein { from { opacity: 0; transform: translateY(6px); } }

  /* ---- filter pills ---- */
  .jumpbar { display: flex; gap: 8px; margin-top: 14px; }
  .jumpbar button {
    padding: 7px 18px; font-size: 13px; border-radius: 100px;
    border: 1px solid var(--border); background: var(--card); color: var(--dim); cursor: pointer;
  }
  .jumpbar button.on { color: var(--accent); border-color: rgba(74,222,128,0.6); background: rgba(74,222,128,0.08); }

  /* ---- schedule ---- */
  .datehead {
    display: flex; align-items: center; gap: 10px; margin: 26px 2px 10px;
  }
  .datehead .d { font-size: 15px; font-weight: 700; }
  .datehead .d.today-tag { color: var(--accent); }
  .datehead .line { flex: 1; height: 1px; background: var(--border); }
  .datehead .cnt { color: var(--dim); font-size: 12px; }
  .match {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 13px 14px 9px; margin-bottom: 9px;
    display: grid; grid-template-columns: 54px 1fr 76px 1fr; align-items: center; gap: 6px;
    transition: transform .12s, border-color .12s;
  }
  .match:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.16); }
  .match.today { border-color: rgba(74,222,128,0.35); background: rgba(74,222,128,0.04); }
  .when { text-align: center; }
  .when .t { font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .when .stage { font-size: 10px; color: var(--accent2); margin-top: 3px; font-weight: 600; }
  .team { display: flex; align-items: center; gap: 9px; font-size: 15px; min-width: 0; }
  .team.home { justify-content: flex-end; text-align: right; }
  .team img { width: 26px; height: 26px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5)); }
  .team .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .team.winner .nm { font-weight: 800; }
  .team.loser .nm { color: var(--dim); }
  .mid { text-align: center; }
  .mid .score { font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
  .mid .vs { font-size: 12px; color: var(--dim); letter-spacing: 2px; }
  .mid .st { font-size: 10px; margin-top: 3px; color: var(--dim); }
  .mid.live .score, .mid.live .st { color: var(--live); }
  .mid.live .st::before {
    content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--live); margin-right: 4px; animation: blink 1.2s infinite;
  }
  @keyframes blink { 50% { opacity: 0.15; } }
  .venue { grid-column: 1 / -1; font-size: 11px; color: rgba(152,164,184,0.65); text-align: center; margin-top: 5px; }

  /* ---- standings ---- */
  .groupgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
  @media (max-width: 580px) { .groupgrid { grid-template-columns: 1fr; } }
  .gcard {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px;
  }
  .gcard h3 {
    font-size: 13px; margin-bottom: 8px; letter-spacing: 1px;
    background: linear-gradient(90deg, var(--gold), #f59e0b);
    -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800;
  }
  .gcard table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .gcard th { color: var(--dim); font-weight: 400; font-size: 11px; text-align: center; padding: 2px; }
  .gcard th:first-child, .gcard td:first-child { text-align: left; }
  .gcard td { padding: 5px 2px; text-align: center; border-top: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .gcard td.tm { display: flex; align-items: center; gap: 7px; }
  .gcard td.tm img { width: 19px; height: 19px; object-fit: contain; }
  .gcard td.pts { font-weight: 800; color: var(--accent); }
  .gcard tr.q td:first-child { border-left: 2px solid var(--accent); padding-left: 5px; }

  /* ---- photos ---- */
  .photogrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }
  @media (max-width: 580px) { .photogrid { grid-template-columns: 1fr; } }
  .pcard {
    display: block; background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    overflow: hidden; text-decoration: none; color: var(--text);
    transition: transform .15s, border-color .15s;
  }
  .pcard:hover { transform: translateY(-2px); border-color: rgba(56,189,248,0.5); }
  .pcard .imgbox { position: relative; padding-top: 56.25%; overflow: hidden; background: #0d1526; }
  .pcard img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .pcard .cap { padding: 11px 13px; font-size: 13.5px; line-height: 1.5; }
  .pcard .meta { padding: 0 13px 11px; font-size: 11px; color: var(--dim); }
  .pcard.wide { grid-column: 1 / -1; }
  .pcard.wide .imgbox { padding-top: 46%; }
  .pcard.wide .cap { font-size: 15px; font-weight: 600; }

  .loading { text-align: center; color: var(--dim); padding: 50px 0; font-size: 14px; }
  .updated { text-align: center; color: rgba(152,164,184,0.6); font-size: 11px; margin-top: 20px; }
  .srcnote { text-align: center; color: rgba(152,164,184,0.5); font-size: 11px; margin-top: 14px; line-height: 1.6; }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="ball">⚽</div>
    <h1>2026 世界杯 <span class="grad">FIFA World Cup 26</span></h1>
    <div class="sub">美国 · 加拿大 · 墨西哥 ｜ 48 队 · 104 场 ｜ 全部为北京时间</div>
    <div class="countdown" id="countdown"></div>
  </div>
</div>

<div class="wrap">
<nav>
  <button class="on" data-p="sched">赛程比分</button>
  <button data-p="groups">积分榜</button>
  <button data-p="photos">精彩瞬间</button>
</nav>

<div id="sched" class="panel on">
  <div class="jumpbar">
    <button data-j="today" class="on">今天</button>
    <button data-j="all">全部</button>
    <button data-j="ko">淘汰赛</button>
  </div>
  <div id="schedbody" class="loading">加载赛程中…</div>
  <div class="updated" id="updated"></div>
</div>

<div id="groups" class="panel">
  <div id="groupbody" class="loading">加载积分榜中…</div>
</div>

<div id="photos" class="panel">
  <div id="photobody" class="loading">加载精彩瞬间中…</div>
  <div class="srcnote">图片与报道来自 ESPN 官方源，点击卡片查看原文 · 本页不存储任何比赛画面</div>
</div>
</div>

<script>
const ZH = {
  "Mexico":"墨西哥","South Africa":"南非","South Korea":"韩国","Czechia":"捷克","Canada":"加拿大",
  "Bosnia-Herzegovina":"波黑","United States":"美国","Paraguay":"巴拉圭","Qatar":"卡塔尔","Switzerland":"瑞士",
  "Brazil":"巴西","Argentina":"阿根廷","France":"法国","England":"英格兰","Spain":"西班牙","Germany":"德国",
  "Portugal":"葡萄牙","Netherlands":"荷兰","Belgium":"比利时","Croatia":"克罗地亚","Italy":"意大利",
  "Uruguay":"乌拉圭","Colombia":"哥伦比亚","Ecuador":"厄瓜多尔","Japan":"日本","Iran":"伊朗","Iraq":"伊拉克",
  "Saudi Arabia":"沙特","Australia":"澳大利亚","Morocco":"摩洛哥","Senegal":"塞内加尔","Ghana":"加纳",
  "Tunisia":"突尼斯","Algeria":"阿尔及利亚","Egypt":"埃及","Ivory Coast":"科特迪瓦","Cape Verde":"佛得角",
  "Congo DR":"刚果(金)","Curaçao":"库拉索","Haiti":"海地","Panama":"巴拿马","New Zealand":"新西兰",
  "Norway":"挪威","Sweden":"瑞典","Austria":"奥地利","Scotland":"苏格兰","Türkiye":"土耳其",
  "Uzbekistan":"乌兹别克斯坦","Jordan":"约旦","TBD":"待定"
};
const STAGE = {
  "group-stage":"小组赛","round-of-32":"1/16决赛","round-of-16":"1/8决赛",
  "quarterfinals":"1/4决赛","semifinals":"半决赛","third-place-game":"季军赛","final":"决赛"
};
const API = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260721&limit=400";
const STAND = "https://site.web.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026";
const NEWS = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/news?limit=40";
const zh = n => ZH[n] || (/^(Winner|Loser|Runner|TBD|Group [A-L])/i.test(n) ? "待定" : n);
let teamGroup = {}, jumpMode = "today", events = [];

const fmtD = d => `${d.getMonth()+1}月${d.getDate()}日 周${"日一二三四五六"[d.getDay()]}`;
const fmtT = d => `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
const dayKey = d => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;

/* countdown to next un-started match */
function tickCountdown() {
  const el = document.getElementById("countdown");
  const next = events.find(e => e.status.type.state === "pre" && new Date(e.date) > new Date());
  const live = events.some(e => e.status.type.state === "in");
  if (live) { el.innerHTML = `🔴 <b>有比赛进行中</b>`; return; }
  if (!next) { el.innerHTML = events.length ? "🏆 全部赛程结束" : "加载中…"; return; }
  const ms = new Date(next.date) - new Date();
  const h = Math.floor(ms / 3.6e6), m = Math.floor(ms % 3.6e6 / 6e4), s = Math.floor(ms % 6e4 / 1e3);
  const c = next.competitions[0].competitors;
  const names = `${zh(c.find(t=>t.homeAway==="home").team.displayName)} vs ${zh(c.find(t=>t.homeAway==="away").team.displayName)}`;
  el.innerHTML = `⏱ 下一场 ${names} <b>${h > 48 ? Math.floor(h/24) + " 天" : ""}${h % 24 || h <= 48 ? (h>48?h%24:h) + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0") : ""}</b>`;
}

function render() {
  const body = document.getElementById("schedbody");
  if (!events.length) { body.innerHTML = '<div class="loading">暂无赛程数据</div>'; return; }
  const todayK = dayKey(new Date());
  let list = events;
  if (jumpMode === "ko") list = events.filter(e => (e.season?.slug || "") !== "group-stage");
  let html = "", lastK = "", hasToday = false;
  for (const e of list) {
    const d = new Date(e.date);
    const k = dayKey(d);
    if (k !== lastK) {
      const n = list.filter(x => dayKey(new Date(x.date)) === k).length;
      const isToday = k === todayK;
      if (isToday) hasToday = true;
      html += `<div class="datehead"${isToday ? ' id="today-anchor"' : ""}>
        <span class="d${isToday ? " today-tag" : ""}">${fmtD(d)}${isToday ? " · 今天" : ""}</span>
        <span class="line"></span><span class="cnt">${n} 场</span></div>`;
      lastK = k;
    }
    const c = e.competitions[0];
    const home = c.competitors.find(t => t.homeAway === "home");
    const away = c.competitors.find(t => t.homeAway === "away");
    const st = e.status.type.state;
    const stage = STAGE[e.season?.slug] || "";
    const grp = teamGroup[home.team.displayName] ? teamGroup[home.team.displayName] + "组" : "";
    const tag = (e.season?.slug === "group-stage" && grp) ? grp : stage;
    let mid;
    if (st === "pre") {
      mid = `<div class="mid"><div class="vs">VS</div><div class="st">未开赛</div></div>`;
    } else if (st === "in") {
      mid = `<div class="mid live"><div class="score">${home.score} - ${away.score}</div><div class="st">${e.status.displayClock || "进行中"}</div></div>`;
    } else {
      mid = `<div class="mid"><div class="score">${home.score} - ${away.score}</div><div class="st">完场</div></div>`;
    }
    const lcls = t => st === "post" ? (t.winner ? " winner" : " loser") : "";
    const logo = t => t.team.logo ? `<img src="${t.team.logo}" alt="" loading="lazy">` : "";
    html += `<div class="match${k===todayK?" today":""}">
      <div class="when"><div class="t">${fmtT(d)}</div><div class="stage">${tag}</div></div>
      <div class="team home${lcls(home)}"><span class="nm">${zh(home.team.displayName)}</span>${logo(home)}</div>
      ${mid}
      <div class="team${lcls(away)}">${logo(away)}<span class="nm">${zh(away.team.displayName)}</span></div>
      <div class="venue">${c.venue?.fullName || ""}</div>
    </div>`;
  }
  body.innerHTML = html;
  if (jumpMode === "today" && hasToday) {
    document.getElementById("today-anchor")?.scrollIntoView({ block: "start" });
    window.scrollBy(0, -64);
  }
  document.getElementById("updated").textContent = "数据来源 ESPN · 更新于 " + fmtT(new Date());
}

async function loadSched() {
  try {
    const r = await fetch(API);
    const d = await r.json();
    events = (d.events || []).sort((a, b) => new Date(a.date) - new Date(b.date));
    render(); tickCountdown();
  } catch (err) {
    document.getElementById("schedbody").innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

async function loadGroups() {
  try {
    const r = await fetch(STAND);
    const d = await r.json();
    let html = '<div class="groupgrid">';
    for (const g of d.children || []) {
      const gname = g.name.replace("Group ", "");
      html += `<div class="gcard"><h3>GROUP ${gname} · ${gname} 组</h3><table>
        <tr><th>球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>净</th><th>分</th></tr>`;
      const entries = g.standings?.entries || [];
      const getv = (e, n) => { const s = e.stats.find(x => x.name === n); return s ? s.displayValue : "-"; };
      entries.sort((a, b) => (parseInt(getv(b,"points"))||0) - (parseInt(getv(a,"points"))||0) || (parseInt(getv(b,"pointDifferential"))||0) - (parseInt(getv(a,"pointDifferential"))||0));
      entries.forEach((e, i) => {
        teamGroup[e.team.displayName] = gname;
        html += `<tr class="${i < 2 ? "q" : ""}">
          <td class="tm"><img src="${e.team.logos?.[0]?.href || ""}" alt="" loading="lazy">${zh(e.team.displayName)}</td>
          <td>${getv(e,"gamesPlayed")}</td><td>${getv(e,"wins")}</td><td>${getv(e,"ties")}</td>
          <td>${getv(e,"losses")}</td><td>${getv(e,"pointDifferential")}</td><td class="pts">${getv(e,"points")}</td></tr>`;
      });
      html += "</table></div>";
    }
    html += '</div><div class="updated">每组前两名 + 8 个成绩最好的第三名晋级 32 强（绿线 = 前两名位置）</div>';
    document.getElementById("groupbody").innerHTML = html;
    render();
  } catch (err) {
    document.getElementById("groupbody").innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

async function loadPhotos() {
  try {
    const r = await fetch(NEWS);
    const d = await r.json();
    const arts = (d.articles || []).filter(a => {
      const img = (a.images || [])[0];
      return img && /\/photo\//.test(img.url); // 只要真照片，过滤视频缩略图
    });
    if (!arts.length) { document.getElementById("photobody").innerHTML = '<div class="loading">暂无图片报道</div>'; return; }
    let html = '<div class="photogrid">';
    arts.forEach((a, i) => {
      const img = a.images[0];
      const link = a.links?.web?.href || "#";
      const dt = a.published ? new Date(a.published) : null;
      const when = dt ? `${dt.getMonth()+1}月${dt.getDate()}日 ${fmtT(dt)}` : "";
      html += `<a class="pcard${i === 0 ? " wide" : ""}" href="${link}" target="_blank" rel="noopener">
        <div class="imgbox"><img src="${img.url}" alt="" loading="lazy"></div>
        <div class="cap">${a.headline || ""}</div>
        <div class="meta">${when} · ESPN</div>
      </a>`;
    });
    html += "</div>";
    document.getElementById("photobody").innerHTML = html;
  } catch (err) {
    document.getElementById("photobody").innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  document.querySelectorAll("nav button").forEach(x => x.classList.remove("on"));
  document.querySelectorAll(".panel").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  document.getElementById(b.dataset.p).classList.add("on");
  window.scrollTo({ top: 0 });
});
document.querySelectorAll(".jumpbar button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".jumpbar button").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  jumpMode = b.dataset.j;
  render();
});

loadGroups().then(loadSched);
loadPhotos();
setInterval(loadSched, 60000);
setInterval(tickCountdown, 1000);
setInterval(loadPhotos, 600000);
</script>
</body>
</html>
