<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 世界杯 · 美加墨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  :root {
    --bg: #07090f; --bg2: #0b0f1a;
    --card: rgba(255,255,255,0.035); --card-hi: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.14);
    --text: #f2f5fa; --dim: #8e9ab0; --faint: rgba(142,154,176,0.55);
    --accent: #34d399; --accent2: #38bdf8; --live: #ff4d5e; --gold: #f5c451;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 800px; margin: 0 auto; padding: 0 16px 90px; }
  body::before { /* 隐约球场底纹（赛程/积分区可见，hero 自带不透明背景不受影响） */
    content: ""; position: fixed; inset: 0; z-index: -1;
    background: url(stadium.jpg) center 30%/cover no-repeat;
    opacity: 0.26; filter: brightness(1.25) saturate(1.05);
    -webkit-mask-image: linear-gradient(180deg, transparent 0%, #000 22%, #000 78%, transparent 100%);
    mask-image: linear-gradient(180deg, transparent 0%, #000 22%, #000 78%, transparent 100%);
  }

  /* ================= hero ================= */
  .hero {
    position: relative; overflow: hidden;
    background:
      radial-gradient(ellipse 70% 90% at 15% -15%, rgba(52,211,153,0.16), transparent 55%),
      radial-gradient(ellipse 70% 90% at 85% -15%, rgba(56,189,248,0.16), transparent 55%),
      linear-gradient(180deg, #0e1526 0%, var(--bg) 100%);
  }
  .hero::before { /* 球场草坪线 */
    content: ""; position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent 0 79px, rgba(255,255,255,0.022) 79px 158px);
    pointer-events: none;
  }
  .hero::after { /* 中圈 */
    content: ""; position: absolute; left: 50%; top: -210px; width: 420px; height: 420px;
    border: 1px solid rgba(255,255,255,0.05); border-radius: 50%;
    transform: translateX(-50%); pointer-events: none;
  }
  .hero-inner { max-width: 800px; margin: 0 auto; padding: 44px 16px 30px; position: relative; }
  .kicker {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; letter-spacing: 3px; color: var(--accent); font-weight: 700;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .kicker::before, .kicker::after { content: ""; width: 22px; height: 1px; background: rgba(52,211,153,0.5); }
  .hero h1 { font-size: 40px; font-weight: 900; letter-spacing: 1px; line-height: 1.1; }
  .hero h1 .grad {
    background: linear-gradient(92deg, var(--accent) 10%, var(--accent2) 60%, #a78bfa 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .hero .sub { color: var(--dim); font-size: 13.5px; margin-top: 10px; letter-spacing: 1px; }
  .hero .sub b { color: var(--gold); font-weight: 600; }

  /* ============ spotlight next-match ============ */
  .spot {
    margin-top: 26px; position: relative; border-radius: 20px; padding: 1px;
    background: linear-gradient(135deg, rgba(52,211,153,0.45), rgba(56,189,248,0.12) 40%, rgba(167,139,250,0.35));
  }
  .spot-in {
    border-radius: 19px; background: linear-gradient(180deg, #101829 0%, #0b101d 100%);
    padding: 22px 20px 18px; text-align: center; position: relative; overflow: hidden;
  }
  .spot-in::before {
    content: ""; position: absolute; inset: -40% -10% auto; height: 120%;
    background: radial-gradient(ellipse 50% 60% at 50% 0%, rgba(245,196,81,0.08), transparent 70%);
    pointer-events: none;
  }
  .spot .label { font-size: 11px; letter-spacing: 2.5px; color: var(--gold); font-weight: 700; margin-bottom: 16px; }
  .spot .label.live-l { color: var(--live); }
  .faceoff { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .fo-team { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 0; }
  .fo-team img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.55)); }
  .fo-team .n { font-size: 17px; font-weight: 800; }
  .fo-mid .cd { font-size: 30px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
  .fo-mid .cd.live-s { color: var(--live); }
  .fo-mid .cdl { font-size: 11px; color: var(--dim); margin-top: 4px; letter-spacing: 1px; }
  .spot .meta { margin-top: 16px; font-size: 12px; color: var(--faint); letter-spacing: 0.5px; }

  /* ================= nav ================= */
  nav {
    display: flex; gap: 10px; position: sticky; top: 0; z-index: 20;
    background: rgba(7,9,15,0.82); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    padding: 14px 16px 12px; margin: 0 -16px;
    border-bottom: 1px solid var(--border);
  }
  nav button {
    flex: 1; padding: 11px 0; font-size: 15px; border-radius: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--card); color: var(--dim);
    cursor: pointer; transition: all .18s; letter-spacing: 1px;
  }
  nav button:hover { border-color: var(--border-hi); color: var(--text); }
  nav button.on {
    background: linear-gradient(135deg, rgba(52,211,153,0.16), rgba(56,189,248,0.14));
    border-color: rgba(52,211,153,0.55); color: #fff;
    box-shadow: 0 0 24px rgba(52,211,153,0.12), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .panel { display: none; }
  .panel.on { display: block; animation: fadein .3s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } }

  /* ============ filter pills ============ */
  .jumpbar { display: flex; gap: 8px; margin-top: 16px; }
  .jumpbar button {
    padding: 8px 20px; font-size: 13px; border-radius: 100px; font-weight: 500;
    border: 1px solid var(--border); background: var(--card); color: var(--dim);
    cursor: pointer; transition: all .15s;
  }
  .jumpbar button.on {
    color: #06281a; background: var(--accent); border-color: var(--accent); font-weight: 700;
  }

  /* ================= schedule ================= */
  .datehead { display: flex; align-items: baseline; gap: 12px; margin: 30px 2px 12px; }
  .datehead .d { font-size: 17px; font-weight: 800; letter-spacing: 0.5px; }
  .datehead .d .wd { font-size: 12px; color: var(--dim); font-weight: 500; margin-left: 6px; }
  .datehead .d.today-tag { color: var(--accent); }
  .datehead .line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
  .datehead .cnt { color: var(--faint); font-size: 12px; }
  .match {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 15px 16px 11px; margin-bottom: 10px;
    display: grid; grid-template-columns: 56px 1fr 80px 1fr; align-items: center; gap: 6px;
    transition: transform .15s, border-color .15s, background .15s;
  }
  .match:hover { transform: translateY(-2px); border-color: var(--border-hi); background: var(--card-hi); }
  .match.today { border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.045); }
  .when { text-align: center; }
  .when .t { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .gchip {
    display: inline-block; font-size: 10px; font-weight: 700; margin-top: 5px;
    padding: 2px 8px; border-radius: 100px; letter-spacing: 0.5px;
    background: var(--gc, rgba(56,189,248,0.15)); color: var(--gt, var(--accent2));
  }
  .team { display: flex; align-items: center; gap: 10px; font-size: 15.5px; min-width: 0; }
  .team.home { justify-content: flex-end; text-align: right; }
  .team img { width: 30px; height: 30px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
  .team .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .team.winner .nm { font-weight: 800; }
  .team.loser .nm { color: var(--dim); }
  .mid { text-align: center; }
  .mid .score { font-size: 21px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 2px; }
  .mid .vs { font-size: 12px; color: var(--faint); letter-spacing: 3px; font-weight: 600; }
  .mid .st { font-size: 10px; margin-top: 3px; color: var(--faint); letter-spacing: 1px; }
  .mid.live .score, .mid.live .st { color: var(--live); }
  .mid.live .st::before {
    content: ""; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--live); margin-right: 4px; animation: blink 1.2s infinite;
    box-shadow: 0 0 8px var(--live);
  }
  @keyframes blink { 50% { opacity: 0.15; } }
  .venue { grid-column: 1 / -1; font-size: 11px; color: var(--faint); text-align: center; margin-top: 6px; letter-spacing: 0.5px; }

  /* ================= standings ================= */
  .groupgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
  @media (max-width: 600px) { .groupgrid { grid-template-columns: 1fr; } }
  .gcard {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 14px 16px; transition: border-color .15s;
  }
  .gcard:hover { border-color: var(--border-hi); }
  .gcard h3 { font-size: 15px; margin-bottom: 11px; letter-spacing: 2px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .gcard h3 .dot { width: 9px; height: 9px; border-radius: 3px; background: var(--gc, var(--accent2)); }
  .gcard table { width: 100%; border-collapse: collapse; font-size: 15px; }
  .gcard th { color: var(--faint); font-weight: 400; font-size: 12.5px; text-align: center; padding: 3px 2px; }
  .gcard th:first-child, .gcard td:first-child { text-align: left; }
  .gcard td { padding: 8px 2px; text-align: center; border-top: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  .gcard td.tm { display: flex; align-items: center; gap: 8px; }
  .gcard td.tm img { width: 23px; height: 23px; object-fit: contain; }
  .gcard td.pts { font-weight: 800; color: var(--accent); font-size: 16px; }
  .gcard tr.q td:first-child { border-left: 2px solid var(--accent); padding-left: 6px; }

  /* ================= photos ================= */
  .photogrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
  @media (max-width: 600px) { .photogrid { grid-template-columns: 1fr; } }
  .pcard {
    position: relative; display: block; border-radius: 16px; overflow: hidden;
    border: 1px solid var(--border); text-decoration: none; color: var(--text);
    transition: transform .2s, border-color .2s, box-shadow .2s; background: #0d1422;
    aspect-ratio: 16 / 11;
  }
  .pcard:hover { transform: translateY(-3px); border-color: rgba(56,189,248,0.55); box-shadow: 0 14px 40px rgba(0,0,0,0.5); }
  .pcard img {
    position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
    transition: transform .45s ease;
  }
  .pcard:hover img { transform: scale(1.06); }
  .pcard .shade {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 38%, rgba(5,8,14,0.55) 68%, rgba(5,8,14,0.94) 100%);
  }
  .pcard .cap {
    position: absolute; left: 0; right: 0; bottom: 0; padding: 14px 15px 11px;
    font-size: 14px; font-weight: 650; line-height: 1.45; text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  }
  .pcard .cap .meta { display: block; font-size: 10.5px; font-weight: 500; color: rgba(255,255,255,0.62); margin-top: 5px; letter-spacing: 1px; }
  .pcard.wide { grid-column: 1 / -1; aspect-ratio: 21 / 10; }
  .pcard.wide .cap { font-size: 18px; font-weight: 800; padding: 18px 18px 14px; }

  .loading { text-align: center; color: var(--dim); padding: 60px 0; font-size: 14px; letter-spacing: 2px; }
  .updated { text-align: center; color: var(--faint); font-size: 11px; margin-top: 24px; letter-spacing: 1px; }
  footer { text-align: center; color: rgba(142,154,176,0.4); font-size: 11px; margin-top: 40px; line-height: 1.8; }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="kicker">FIFA WORLD CUP 26</div>
    <h1>2026 <span class="grad">世界杯</span></h1>
    <div class="sub">美国 · 加拿大 · 墨西哥 ｜ <b>48</b> 队 · <b>104</b> 场 ｜ 北京时间 6.12 — 7.20</div>
    <div class="spot" id="spot" style="display:none">
      <div class="spot-in">
        <div class="label" id="spot-label">NEXT MATCH · 下一场</div>
        <div class="faceoff">
          <div class="fo-team"><img id="sp-h-img" src="" alt=""><div class="n" id="sp-h-n"></div></div>
          <div class="fo-mid"><div class="cd" id="sp-cd">--:--:--</div><div class="cdl" id="sp-cdl">开球倒计时</div></div>
          <div class="fo-team"><img id="sp-a-img" src="" alt=""><div class="n" id="sp-a-n"></div></div>
        </div>
        <div class="meta" id="sp-meta"></div>
      </div>
    </div>
  </div>
</div>

<div class="wrap">
<nav>
  <button class="on" data-p="sched">赛程比分</button>
  <button data-p="groups">积分榜</button>
  <button data-p="photos">精彩瞬间</button>
</nav>

<div id="sched" class="panel on">
  <div class="jumpbar">
    <button data-j="today" class="on">今天</button>
    <button data-j="all">全部</button>
    <button data-j="ko">淘汰赛</button>
  </div>
  <div id="schedbody" class="loading">加载赛程中…</div>
  <div class="updated" id="updated"></div>
</div>

<div id="groups" class="panel">
  <div id="groupbody" class="loading">加载积分榜中…</div>
</div>

<div id="photos" class="panel">
  <div id="photobody" class="loading">加载精彩瞬间中…</div>
</div>

<footer>数据与图片来自 ESPN 官方公开接口 · 本页不存储任何比赛画面<br>⚽ 自用看板 · 每 60 秒自动更新比分</footer>
</div>

<script>
const ZH = {
  "Mexico":"墨西哥","South Africa":"南非","South Korea":"韩国","Czechia":"捷克","Canada":"加拿大",
  "Bosnia-Herzegovina":"波黑","United States":"美国","Paraguay":"巴拉圭","Qatar":"卡塔尔","Switzerland":"瑞士",
  "Brazil":"巴西","Argentina":"阿根廷","France":"法国","England":"英格兰","Spain":"西班牙","Germany":"德国",
  "Portugal":"葡萄牙","Netherlands":"荷兰","Belgium":"比利时","Croatia":"克罗地亚","Italy":"意大利",
  "Uruguay":"乌拉圭","Colombia":"哥伦比亚","Ecuador":"厄瓜多尔","Japan":"日本","Iran":"伊朗","Iraq":"伊拉克",
  "Saudi Arabia":"沙特","Australia":"澳大利亚","Morocco":"摩洛哥","Senegal":"塞内加尔","Ghana":"加纳",
  "Tunisia":"突尼斯","Algeria":"阿尔及利亚","Egypt":"埃及","Ivory Coast":"科特迪瓦","Cape Verde":"佛得角",
  "Congo DR":"刚果(金)","Curaçao":"库拉索","Haiti":"海地","Panama":"巴拿马","New Zealand":"新西兰",
  "Norway":"挪威","Sweden":"瑞典","Austria":"奥地利","Scotland":"苏格兰","Türkiye":"土耳其",
  "Uzbekistan":"乌兹别克斯坦","Jordan":"约旦","TBD":"待定"
};
const STAGE = {
  "group-stage":"小组赛","round-of-32":"1/16决赛","round-of-16":"1/8决赛",
  "quarterfinals":"1/4决赛","semifinals":"半决赛","third-place-game":"季军赛","final":"决赛"
};
/* 12 组 × 配色（chip 背景/文字） */
const GC = {
  A:["rgba(52,211,153,.16)","#34d399"], B:["rgba(56,189,248,.16)","#38bdf8"],
  C:["rgba(245,196,81,.16)","#f5c451"], D:["rgba(251,113,133,.16)","#fb7185"],
  E:["rgba(167,139,250,.16)","#a78bfa"], F:["rgba(45,212,191,.16)","#2dd4bf"],
  G:["rgba(251,146,60,.16)","#fb923c"], H:["rgba(96,165,250,.16)","#60a5fa"],
  I:["rgba(244,114,182,.16)","#f472b6"], J:["rgba(163,230,53,.16)","#a3e635"],
  K:["rgba(34,211,238,.16)","#22d3ee"], L:["rgba(253,224,71,.16)","#fde047"]
};
const API = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260721&limit=400";
const STAND = "https://site.web.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026";
const NEWS = "https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/news?limit=40";
const zh = n => ZH[n] || (/^(Winner|Loser|Runner|TBD|Group [A-L])/i.test(n) ? "待定" : n);
let teamGroup = {}, jumpMode = "today", events = [];

const fmtD = d => `${d.getMonth()+1}月${d.getDate()}日`;
const wd = d => `周${"日一二三四五六"[d.getDay()]}`;
const fmtT = d => `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
const dayKey = d => `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;

/* ============ spotlight ============ */
function tickSpot() {
  const spot = document.getElementById("spot");
  if (!events.length) return;
  let e = events.find(x => x.status.type.state === "in");
  const isLive = !!e;
  if (!e) e = events.find(x => x.status.type.state === "pre" && new Date(x.date) > new Date());
  if (!e) { spot.style.display = "none"; return; }
  spot.style.display = "";
  const c = e.competitions[0];
  const h = c.competitors.find(t => t.homeAway === "home");
  const a = c.competitors.find(t => t.homeAway === "away");
  document.getElementById("sp-h-img").src = h.team.logo || "";
  document.getElementById("sp-a-img").src = a.team.logo || "";
  document.getElementById("sp-h-n").textContent = zh(h.team.displayName);
  document.getElementById("sp-a-n").textContent = zh(a.team.displayName);
  const lbl = document.getElementById("spot-label");
  const cd = document.getElementById("sp-cd");
  const cdl = document.getElementById("sp-cdl");
  if (isLive) {
    lbl.textContent = "LIVE · 正在比赛"; lbl.classList.add("live-l");
    cd.textContent = `${h.score} - ${a.score}`; cd.classList.add("live-s");
    cdl.textContent = e.status.displayClock || "进行中";
  } else {
    lbl.textContent = "NEXT MATCH · 下一场"; lbl.classList.remove("live-l");
    cd.classList.remove("live-s");
    const ms = new Date(e.date) - new Date();
    const day = Math.floor(ms / 8.64e7), hh = Math.floor(ms % 8.64e7 / 3.6e6),
          mm = Math.floor(ms % 3.6e6 / 6e4), ss = Math.floor(ms % 6e4 / 1e3);
    cd.textContent = day > 0 ? `${day}天 ${hh}小时` :
      `${String(hh).padStart(2,"0")}:${String(mm).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
    cdl.textContent = "开球倒计时";
  }
  const d = new Date(e.date);
  const grp = teamGroup[h.team.displayName] ? ` · ${teamGroup[h.team.displayName]} 组` : "";
  document.getElementById("sp-meta").textContent =
    `${fmtD(d)} ${wd(d)} ${fmtT(d)} · ${c.venue?.fullName || ""}${grp}`;
}

/* ============ schedule ============ */
function render() {
  const body = document.getElementById("schedbody");
  if (!events.length) { body.innerHTML = '<div class="loading">暂无赛程数据</div>'; return; }
  const todayK = dayKey(new Date());
  let list = events;
  if (jumpMode === "ko") list = events.filter(e => (e.season?.slug || "") !== "group-stage");
  let html = "", lastK = "", hasToday = false;
  for (const e of list) {
    const d = new Date(e.date);
    const k = dayKey(d);
    if (k !== lastK) {
      const n = list.filter(x => dayKey(new Date(x.date)) === k).length;
      const isToday = k === todayK;
      if (isToday) hasToday = true;
      html += `<div class="datehead"${isToday ? ' id="today-anchor"' : ""}>
        <span class="d${isToday ? " today-tag" : ""}">${fmtD(d)}<span class="wd">${wd(d)}${isToday ? " · 今天" : ""}</span></span>
        <span class="line"></span><span class="cnt">${n} 场</span></div>`;
      lastK = k;
    }
    const c = e.competitions[0];
    const home = c.competitors.find(t => t.homeAway === "home");
    const away = c.competitors.find(t => t.homeAway === "away");
    const st = e.status.type.state;
    const stage = STAGE[e.season?.slug] || "";
    const g = teamGroup[home.team.displayName];
    const isGroup = e.season?.slug === "group-stage" && g;
    const [gc, gt] = isGroup ? (GC[g] || GC.A) : ["rgba(245,196,81,.14)", "var(--gold)"];
    const chip = `<span class="gchip" style="--gc:${gc};--gt:${gt}">${isGroup ? g + " 组" : stage}</span>`;
    let mid;
    if (st === "pre") {
      mid = `<div class="mid"><div class="vs">VS</div><div class="st">未开赛</div></div>`;
    } else if (st === "in") {
      mid = `<div class="mid live"><div class="score">${home.score} - ${away.score}</div><div class="st">${e.status.displayClock || "进行中"}</div></div>`;
    } else {
      mid = `<div class="mid"><div class="score">${home.score} - ${away.score}</div><div class="st">完场</div></div>`;
    }
    const lcls = t => st === "post" ? (t.winner ? " winner" : " loser") : "";
    const logo = t => t.team.logo ? `<img src="${t.team.logo}" alt="" loading="lazy">` : "";
    html += `<div class="match${k===todayK?" today":""}">
      <div class="when"><div class="t">${fmtT(d)}</div>${chip}</div>
      <div class="team home${lcls(home)}"><span class="nm">${zh(home.team.displayName)}</span>${logo(home)}</div>
      ${mid}
      <div class="team${lcls(away)}">${logo(away)}<span class="nm">${zh(away.team.displayName)}</span></div>
      <div class="venue">${c.venue?.fullName || ""}</div>
    </div>`;
  }
  body.innerHTML = html;
  if (jumpMode === "today" && hasToday) {
    document.getElementById("today-anchor")?.scrollIntoView({ block: "start" });
    window.scrollBy(0, -68);
  }
  document.getElementById("updated").textContent = "数据来源 ESPN · 更新于 " + fmtT(new Date());
}

async function loadSched() {
  try {
    const r = await fetch(API);
    const d = await r.json();
    events = (d.events || []).sort((a, b) => new Date(a.date) - new Date(b.date));
    render(); tickSpot();
  } catch (err) {
    document.getElementById("schedbody").innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

/* ============ standings ============ */
async function loadGroups() {
  try {
    const r = await fetch(STAND);
    const d = await r.json();
    let html = '<div class="groupgrid">';
    for (const g of d.children || []) {
      const gname = g.name.replace("Group ", "");
      const [gc] = GC[gname] || GC.A;
      const gt = (GC[gname] || GC.A)[1];
      html += `<div class="gcard"><h3><span class="dot" style="--gc:${gt}"></span>GROUP ${gname} · ${gname} 组</h3><table>
        <tr><th>球队</th><th>赛</th><th>胜</th><th>平</th><th>负</th><th>净</th><th>分</th></tr>`;
      const entries = g.standings?.entries || [];
      const getv = (e, n) => { const s = e.stats.find(x => x.name === n); return s ? s.displayValue : "-"; };
      entries.sort((a, b) => (parseInt(getv(b,"points"))||0) - (parseInt(getv(a,"points"))||0) || (parseInt(getv(b,"pointDifferential"))||0) - (parseInt(getv(a,"pointDifferential"))||0));
      entries.forEach((e, i) => {
        teamGroup[e.team.displayName] = gname;
        html += `<tr class="${i < 2 ? "q" : ""}">
          <td class="tm"><img src="${e.team.logos?.[0]?.href || ""}" alt="" loading="lazy">${zh(e.team.displayName)}</td>
          <td>${getv(e,"gamesPlayed")}</td><td>${getv(e,"wins")}</td><td>${getv(e,"ties")}</td>
          <td>${getv(e,"losses")}</td><td>${getv(e,"pointDifferential")}</td><td class="pts">${getv(e,"points")}</td></tr>`;
      });
      html += "</table></div>";
    }
    html += '</div><div class="updated">每组前两名 + 8 个成绩最好的第三名晋级 32 强（绿线 = 前两名位置）</div>';
    document.getElementById("groupbody").innerHTML = html;
    render(); tickSpot();
  } catch (err) {
    document.getElementById("groupbody").innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

/* ============ photos ============ */
async function loadPhotos() {
  try {
    const r = await fetch(NEWS);
    const d = await r.json();
    const arts = (d.articles || []).filter(a => {
      const img = (a.images || [])[0];
      return img && /\/photo\//.test(img.url);
    });
    if (!arts.length) { document.getElementById("photobody").innerHTML = '<div class="loading">暂无图片报道</div>'; return; }
    let html = '<div class="photogrid">';
    arts.forEach((a, i) => {
      const img = a.images[0];
      const link = a.links?.web?.href || "#";
      const dt = a.published ? new Date(a.published) : null;
      const when = dt ? `${dt.getMonth()+1}月${dt.getDate()}日 ${fmtT(dt)}` : "";
      html += `<a class="pcard${i === 0 ? " wide" : ""}" href="${link}" target="_blank" rel="noopener">
        <img src="${img.url}" alt="" loading="lazy">
        <div class="shade"></div>
        <div class="cap">${a.headline || ""}<span class="meta">${when} · ESPN</span></div>
      </a>`;
    });
    html += "</div>";
    document.getElementById("photobody").innerHTML = html;
  } catch (err) {
    document.getElementById("photobody").innerHTML = '<div class="loading">加载失败，请刷新重试</div>';
  }
}

document.querySelectorAll("nav button").forEach(b => b.onclick = () => {
  document.querySelectorAll("nav button").forEach(x => x.classList.remove("on"));
  document.querySelectorAll(".panel").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  document.getElementById(b.dataset.p).classList.add("on");
  window.scrollTo({ top: 0 });
});
document.querySelectorAll(".jumpbar button").forEach(b => b.onclick = () => {
  document.querySelectorAll(".jumpbar button").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  jumpMode = b.dataset.j;
  render();
});

loadGroups().then(loadSched);
loadPhotos();
setInterval(loadSched, 60000);
setInterval(tickSpot, 1000);
setInterval(loadPhotos, 600000);
</script>
